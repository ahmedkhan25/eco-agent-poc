<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EcoHeart Map Explorer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f3f0eb",
                        "surface-container-high": "#ebe8e3",
                        "primary-container": "#1b4332",
                        "on-background": "#1c1c19",
                        "surface-tint": "#3f6653",
                        "primary": "#012d1d",
                        "on-primary-fixed-variant": "#274e3d",
                        "primary-fixed-dim": "#a5d0b9",
                        "tertiary": "#421b00",
                        "on-primary-container": "#86af99",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#95d4b3",
                        "secondary-fixed": "#b1f0ce",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#fd862c",
                        "on-surface-variant": "#414844",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#a5d0b9",
                        "on-tertiary-fixed-variant": "#743500",
                        "surface-container-highest": "#e5e2dd",
                        "secondary": "#2c694e",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#aeeecb",
                        "tertiary-fixed-dim": "#ffb68a",
                        "on-tertiary-fixed": "#321300",
                        "surface-container-low": "#f6f3ee",
                        "inverse-surface": "#31302d",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#0e5138",
                        "surface": "#fcf9f4",
                        "primary-fixed": "#c1ecd4",
                        "outline-variant": "#c1c8c2",
                        "surface-dim": "#dcdad5",
                        "surface-container": "#f0ede9",
                        "surface-bright": "#fcf9f4",
                        "on-secondary-container": "#316e52",
                        "on-secondary-fixed": "#002114",
                        "surface-variant": "#e5e2dd",
                        "on-primary-fixed": "#002114",
                        "tertiary-fixed": "#ffdbc8",
                        "background": "#fcf9f4",
                        "outline": "#717973",
                        "on-surface": "#1c1c19",
                        "tertiary-container": "#632c00"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background-color: rgba(252, 249, 244, 0.7);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen overflow-hidden flex flex-col">
<!-- TopNavBar -->
<header class="bg-[#fcf9f4] dark:bg-stone-950 text-[#1B4332] dark:text-[#aeeecb] font-['Manrope'] tracking-tight flex justify-between items-center px-8 h-16 w-full z-50 fixed top-0 left-0">
<div class="text-2xl font-bold text-[#1B4332] dark:text-[#aeeecb]">EcoHeart</div>
<nav class="hidden md:flex items-center gap-x-8">
<a class="text-stone-500 dark:text-stone-400 hover:text-[#1B4332] transition-colors" href="#">About</a>
<div class="h-8 w-8 rounded-full bg-surface-container-high border-2 border-primary-container overflow-hidden">
<img alt="User Profile" data-alt="close up professional headshot of a woman with a warm expression and natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCETWqKRalQFHUX2UoL5k-JdLN1-8k8RJpBtZaYce4U6oSQlSbrajDthq87cwg8pez44Ps4-5I0-8eSxObkyqAuq3JOR6CDbE9SC-1vfQJyfSSZpiCoTeUJMg1kzn-XKA8k_tTYXvc1nfBetAo55z3__Y6zkrFmD3rQWvaZm1uQFN8u0cvTOjvcjIu0cD_d8qkfqMVc-qqvUJjnMgE4eGeDDJtc19-4QBWIY2M7QQjvZueaEkgC0LTyC-QNsiVilLY9PUDGfZ6mHrw"/>
</div>
</nav>
</header>
<div class="flex flex-1 pt-16">
<!-- SideNavBar (The Floating Monolith) -->
<aside class="bg-[#ffffff] dark:bg-stone-900 text-[#1B4332] dark:text-[#aeeecb] font-['Manrope'] text-xs shadow-[0px_12px_32px_rgba(28,28,25,0.06)] flex flex-col items-center py-8 gap-y-6 docked fixed left-0 h-screen w-[72px] z-40">
<div class="flex flex-col items-center gap-y-6 w-full">
<!-- Auth -->
<button class="text-stone-400 dark:text-stone-500 p-3 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-full transition-all scale-110 duration-300">
<span class="material-symbols-outlined">lock</span>
</button>
<!-- Home -->
<button class="text-stone-400 dark:text-stone-500 p-3 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-full transition-all scale-110 duration-300">
<span class="material-symbols-outlined">home</span>
</button>
<!-- Community -->
<button class="text-stone-400 dark:text-stone-500 p-3 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-full transition-all scale-110 duration-300">
<span class="material-symbols-outlined">group</span>
</button>
<!-- Chat -->
<button class="text-stone-400 dark:text-stone-500 p-3 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-full transition-all scale-110 duration-300">
<span class="material-symbols-outlined">chat</span>
</button>
<!-- Documents -->
<button class="text-stone-400 dark:text-stone-500 p-3 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-full transition-all scale-110 duration-300">
<span class="material-symbols-outlined">description</span>
</button>
<!-- Map Explorer (ACTIVE) -->
<button class="bg-[#aeeecb] dark:bg-[#1B4332] rounded-full p-3 text-[#1B4332] dark:text-[#aeeecb] scale-110 duration-300 shadow-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
</button>
<!-- Settings -->
<button class="text-stone-400 dark:text-stone-500 p-3 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-full transition-all scale-110 duration-300">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</aside>
<!-- Main Map Canvas -->
<main class="relative flex-1 ml-[72px] h-full bg-surface-container overflow-hidden">
<!-- Simulated Map Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="top-down satellite topographic map view of Olympia Washington showing rivers, urban grids, and dense forests in professional muted earth tones" data-location="Olympia, Washington" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDVqj_JnX7RdbmzDyRher4PfFKrn6Bm--GkmYkVfosvnvKzCM7pkit0LJafVosqj2rMxwZAGATlfAXqzLXqyB_sOpewmPF0Ixy7_CHbfw3su-YIhJiXAV78S1Zor1WhWgIkS1FqbbknUdbJmmYOlUMifMuNaIRA1YIIW5YFWF0ALjtYG4K_72FMTBJKqBcRQKEre7evg-gaknaZpGkyXGwzK0WWlKqNZz2D7hYErxdWSVA3ab7xgsqmiFoLcR1jkDWxBeDPcmqilfU')">
<!-- Overlay Shadow/Gradient for Depth -->
<div class="absolute inset-0 bg-primary/5"></div>
</div>
<!-- Left-side Overlay: LAYER CATALOG -->
<div class="absolute top-8 left-8 z-10 w-80 glass-panel p-6 rounded-lg shadow-xl border border-outline-variant/15 flex flex-col gap-6">
<div>
<h2 class="font-headline text-xl font-bold text-primary tracking-tight">LAYER CATALOG</h2>
<p class="text-xs text-on-surface-variant mt-1 font-medium uppercase tracking-widest">Environmental Data Feeds</p>
</div>
<div class="space-y-4">
<!-- Category: Climate & Hazards -->
<div>
<button class="flex items-center justify-between w-full text-left font-semibold text-sm py-2">
<span class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">cyclone</span>
                                Climate &amp; Hazards
                            </span>
<span class="material-symbols-outlined text-lg">expand_more</span>
</button>
<div class="mt-2 pl-6 space-y-3">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input checked="" class="peer h-5 w-5 rounded border-outline-variant text-primary focus:ring-0 appearance-none bg-surface-container-lowest" type="checkbox"/>
<span class="material-symbols-outlined absolute text-xs text-white opacity-0 peer-checked:opacity-100">check</span>
<div class="absolute inset-0 rounded border-2 border-primary opacity-0 peer-checked:opacity-100 bg-primary"></div>
</div>
<span class="text-sm font-medium text-on-surface">FEMA Flood Zones</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<input class="h-5 w-5 rounded border-outline-variant text-primary focus:ring-0 appearance-none bg-surface-container-lowest" type="checkbox"/>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Sea Level Rise (High)</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<input class="h-5 w-5 rounded border-outline-variant text-primary focus:ring-0 appearance-none bg-surface-container-lowest" type="checkbox"/>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Wildfire Vulnerability</span>
</label>
</div>
</div>
<!-- Category: Water & Environment -->
<div>
<button class="flex items-center justify-between w-full text-left font-semibold text-sm py-2">
<span class="flex items-center gap-2 text-stone-500">
<span class="material-symbols-outlined text-lg">water_drop</span>
                                Water &amp; Environment
                            </span>
<span class="material-symbols-outlined text-lg text-stone-500">chevron_right</span>
</button>
</div>
<!-- Category: Topography -->
<div>
<button class="flex items-center justify-between w-full text-left font-semibold text-sm py-2">
<span class="flex items-center gap-2 text-stone-500">
<span class="material-symbols-outlined text-lg">terrain</span>
                                Terrain &amp; Elevation
                            </span>
<span class="material-symbols-outlined text-lg text-stone-500">chevron_right</span>
</button>
</div>
</div>
<div class="pt-4 mt-2 border-t border-outline-variant/15">
<button class="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-surface-container-high rounded-full text-primary text-sm font-bold transition-all hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-lg">add_circle</span>
                        Import Custom GeoJSON
                    </button>
</div>
</div>
<!-- Map Center Marker (Olympia) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none">
<div class="relative flex items-center justify-center">
<div class="absolute w-24 h-24 bg-tertiary-container/20 rounded-full animate-pulse border border-tertiary-container/30"></div>
<span class="material-symbols-outlined text-4xl text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Bottom Overlay: FEATURE INSPECTOR -->
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 w-[90%] max-w-4xl glass-panel p-8 rounded-lg shadow-2xl border border-outline-variant/15">
<div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
<div class="space-y-6 flex-1">
<div class="flex items-center gap-3">
<div class="h-10 w-10 rounded-md bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container">info</span>
</div>
<div>
<h3 class="font-headline text-lg font-bold text-primary">FEATURE INSPECTOR</h3>
<p class="text-xs font-medium text-tertiary-container uppercase tracking-widest">Active Selection: West Olympia Watershed</p>
</div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-8">
<div class="space-y-1">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Zone Classification</p>
<p class="text-2xl font-headline font-extrabold text-primary">Zone: AE</p>
</div>
<div class="space-y-1">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Base Flood Elevation</p>
<p class="text-2xl font-headline font-extrabold text-primary">BFE: 12ft</p>
</div>
<div class="space-y-1">
<p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Data Provenance</p>
<div class="flex items-center gap-2">
<span class="text-sm font-semibold text-primary">Source: FEMA NFHL</span>
<span class="material-symbols-outlined text-sm text-primary">verified</span>
</div>
</div>
</div>
</div>
<div class="shrink-0 flex items-center gap-4">
<button class="bg-gradient-to-br from-tertiary-container to-tertiary text-white px-8 py-4 rounded-full font-bold text-sm flex items-center gap-3 shadow-lg hover:brightness-110 transition-all">
                            Ask EcoHeart about this
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Zoom Controls & Map Actions -->
<div class="absolute right-8 top-8 flex flex-col gap-3">
<button class="glass-panel w-12 h-12 rounded-lg flex items-center justify-center text-primary shadow-md hover:bg-white transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="glass-panel w-12 h-12 rounded-lg flex items-center justify-center text-primary shadow-md hover:bg-white transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="h-4"></div>
<button class="glass-panel w-12 h-12 rounded-lg flex items-center justify-center text-primary shadow-md hover:bg-white transition-colors">
<span class="material-symbols-outlined">my_location</span>
</button>
<button class="glass-panel w-12 h-12 rounded-lg flex items-center justify-center text-primary shadow-md hover:bg-white transition-colors">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</main>
</div>
</body></html>
